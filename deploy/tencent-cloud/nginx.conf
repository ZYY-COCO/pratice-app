server {
    listen 80 default_server;
    server_name www.gangyantong.com gangyantong.com 159.75.155.82 _;

    location /.well-known/acme-challenge/ {
        root /var/www/gangyantong;
    }

    location / {
        return 301 https://www.gangyantong.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.gangyantong.com;

    ssl_certificate /etc/letsencrypt/live/www.gangyantong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.gangyantong.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/gangyantong;
    index index.html;

    client_max_body_size 20m;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files /index.html =404;
    }

    location = /privacy {
        charset utf-8;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files /static/privacy.html =404;
    }

    location = /privacy.html {
        charset utf-8;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files /static/privacy.html =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files $uri $uri/ /index.html;
    }
}
