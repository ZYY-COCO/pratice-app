name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build H5 frontend
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          VITE_API_BASE_URL=/api npm run build:h5
          test -f dist/build/h5/index.html
          test -f dist/build/h5/static/support.html

      - name: Deploy frontend over SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_PORT: ${{ secrets.TENCENT_PORT || '22' }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
        run: |
          set -euo pipefail

          TENCENT_HOST="$(printf '%s' "${TENCENT_HOST}" | tr -d '[:space:]')"
          TENCENT_USER="$(printf '%s' "${TENCENT_USER}" | tr -d '[:space:]')"
          TENCENT_PORT="$(printf '%s' "${TENCENT_PORT:-22}" | tr -d '[:space:]')"

          # Normalize common copy-paste mistakes from GitHub Secrets.
          TENCENT_HOST="${TENCENT_HOST#ssh://}"
          TENCENT_HOST="${TENCENT_HOST#http://}"
          TENCENT_HOST="${TENCENT_HOST#https://}"
          TENCENT_HOST="${TENCENT_HOST##*@}"
          TENCENT_HOST="${TENCENT_HOST%%/*}"
          TENCENT_HOST="${TENCENT_HOST%%:*}"
          TENCENT_USER="${TENCENT_USER#ssh}"
          TENCENT_USER="${TENCENT_USER%@*}"

          if [ -z "${TENCENT_HOST}" ] || [ -z "${TENCENT_USER}" ] || [ -z "${TENCENT_SSH_KEY}" ]; then
            echo "Missing required Tencent Cloud SSH secrets." >&2
            exit 1
          fi
          if ! [[ "${TENCENT_PORT}" =~ ^[0-9]+$ ]]; then
            echo "TENCENT_PORT must be a plain number, for example 22." >&2
            exit 1
          fi
          if [[ "${TENCENT_HOST}" =~ [^A-Za-z0-9._-] ]]; then
            echo "TENCENT_HOST must be only the server IP/domain, for example 159.75.155.82." >&2
            exit 1
          fi
          if [[ "${TENCENT_USER}" =~ [^A-Za-z0-9._-] ]]; then
            echo "TENCENT_USER must be only the Linux username, for example ubuntu." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${TENCENT_SSH_KEY}" > ~/.ssh/tencent_cloud_key
          chmod 600 ~/.ssh/tencent_cloud_key
          ssh-keyscan -p "${TENCENT_PORT}" -H "${TENCENT_HOST}" >> ~/.ssh/known_hosts

          tar -C frontend/dist/build/h5 -czf /tmp/gangyantong-h5.tgz .
          cp deploy/tencent-cloud/nginx.conf /tmp/gangyantong-nginx.conf

          scp -i ~/.ssh/tencent_cloud_key \
            -P "${TENCENT_PORT}" \
            /tmp/gangyantong-h5.tgz \
            /tmp/gangyantong-nginx.conf \
            "${TENCENT_USER}@${TENCENT_HOST}:/tmp/"

          ssh -i ~/.ssh/tencent_cloud_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p "${TENCENT_PORT}" "${TENCENT_USER}@${TENCENT_HOST}" \
            'set -euo pipefail
            tmp_dir="$(mktemp -d)"
            tar -xzf /tmp/gangyantong-h5.tgz -C "${tmp_dir}"
            sudo mkdir -p /var/www/gangyantong
            sudo rsync -a --delete "${tmp_dir}/" /var/www/gangyantong/
            sudo cp /tmp/gangyantong-nginx.conf /etc/nginx/sites-available/gangyantong
            sudo ln -sfn /etc/nginx/sites-available/gangyantong /etc/nginx/sites-enabled/gangyantong
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx
            rm -rf "${tmp_dir}" /tmp/gangyantong-h5.tgz /tmp/gangyantong-nginx.conf
            curl -fsS http://127.0.0.1/static/support.html >/dev/null'
