name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy over SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_PORT: ${{ secrets.TENCENT_PORT || '22' }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${TENCENT_HOST}" ] || [ -z "${TENCENT_USER}" ] || [ -z "${TENCENT_SSH_KEY}" ]; then
            echo "Missing required Tencent Cloud SSH secrets." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${TENCENT_SSH_KEY}" > ~/.ssh/tencent_cloud_key
          chmod 600 ~/.ssh/tencent_cloud_key
          ssh-keyscan -p "${TENCENT_PORT}" -H "${TENCENT_HOST}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/tencent_cloud_key -p "${TENCENT_PORT}" "${TENCENT_USER}@${TENCENT_HOST}" \
            "cd /opt/gangyantong/app && BRANCH=main bash deploy/tencent-cloud/deploy.sh"
